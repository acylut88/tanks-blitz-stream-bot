<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96">
        <h1 class="text-2xl font-bold mb-6 text-center text-yellow-500">🛡️ Штаб Tanks Blitz</h1>
        {% if error %}
            <p class="text-red-500 text-sm mb-4 text-center">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1">Логин</label>
                <input type="text" name="username" class="w-full p-2 rounded bg-gray-700 border border-gray-600 focus:border-yellow-500 focus:outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-1">Пароль</label>
                <input type="password" name="password" class="w-full p-2 rounded bg-gray-700 border border-gray-600 focus:border-yellow-500 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded transition">Войти</button>
        </form>
    </div>
</body>
</html>
