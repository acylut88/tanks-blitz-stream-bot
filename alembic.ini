[alembic]
# Путь к папке с миграциями
script_location = app/database/migrations

# Добавляем корень проекта в sys.path (чтобы Alembic видел наши модули)
prepend_sys_path = .

# URL БД (мы переопределим его в env.py из config.py, так что здесь заглушка)
sqlalchemy.url = sqlite+aiosqlite:///./tanksbot_test.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S